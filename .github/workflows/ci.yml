name: CI Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: uv sync

    - name: Run tests
      run: pytest

    - name: Run flake8
      run: flake8 src api scripts tests

    - name: Run black
      run: black --check .